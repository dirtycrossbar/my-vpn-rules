name: Build GeoSite

on:
  workflow_dispatch:
  push:
    paths:
      - 'geosite-rules/**.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build geosite.dat
        run: |
          git clone https://github.com/v2fly/domain-list-community.git compiler
          cd compiler
          
          # Копируем ваши файлы в папку data/
          cp ../geosite-rules/*.txt data/
          
          # Обрабатываем файлы: добавляем domain: к строкам без префикса
          for f in data/*.txt; do
            sed -i -E '/^(domain:|full:)/! s/^[[:space:]]*(.+)[[:space:]]*$/domain:\1/' "$f"
          done
          
          # Запускаем сборку
          go run ./ --outputdir=../ --outputname=geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
