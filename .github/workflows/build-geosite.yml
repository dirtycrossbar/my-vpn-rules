name: Build GeoSite

on:
  workflow_dispatch:
  push:
    paths:
      - 'geosite-rules/**.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Combine files
        run: cat geosite-rules/*.txt > combined.txt

      - name: Download dlc binary
        run: |
          curl -L -o dlc https://github.com/v2fly/domain-list-community/releases/download/20240328144447/dlc-linux-amd64
          chmod +x dlc

      - name: Build geosite.dat
        run: ./dlc -in combined.txt -out geosite.dat

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
