name: Build GeoSite

on:
  push:
    paths:
      - 'geosite-rules/**.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download domain-list-community binary
        run: |
          wget https://github.com/v2fly/domain-list-community/releases/download/20240328144447/domain-list-community-linux-64
          chmod +x domain-list-community-linux-64
          mv domain-list-community-linux-64 dlc

      - name: Combine rule files
        run: |
          mkdir -p temp
          cat geosite-rules/*.txt > temp/combined.txt

      - name: Debug - show combined file (first 20 lines)
        run: |
          echo "=== COMBINED.TXT (первые 20 строк) ==="
          head -n 20 temp/combined.txt
          echo "=== КОНЕЦ ==="

      - name: Build geosite.dat
        run: |
          ./dlc -in temp/combined.txt -out geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          name: GeoSite Latest
          body: Автоматическая сборка geosite.dat
          draft: false
          prerelease: false
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
