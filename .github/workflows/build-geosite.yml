name: Build GeoSite

on:
  push:
    paths:
      - 'geosite-rules/**.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build geosite.dat with official action
        uses: v2fly/domain-list-community-action@v1
        with:
          input-files: geosite-rules/*.txt
          output-file: geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          name: GeoSite Latest
          body: Автоматическая сборка geosite.dat
          draft: false
          prerelease: false
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
