name: Build GeoIP
on:
  workflow_dispatch:
  push:
    paths:
      - 'geoip-rules/**.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate config.json dynamically
        run: |
          # Инициализируем JSON
          echo '{"input":[' > config.json
          first=true
          
          # Проходим по всем .txt файлам в папке
          for f in geoip-rules/*.txt; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .txt)
            # Приводим имя к нижнему регистру (для единообразия с geosite)
            lower=$(echo "$base" | tr '[:upper:]' '[:lower:]')
            
            if [ "$first" = true ]; then
              first=false
            else
              printf ',' >> config.json
            fi
            
            # Добавляем блок в JSON
            printf '{"type":"text","action":"add","args":{"name":"%s","uri":"../geoip-rules/%s.txt","onlyIPType":"ipv4"}}' "$lower" "$base" >> config.json
          done
          
          # Закрываем массив input и добавляем секцию вывода
          echo '],"output":[{"type":"v2rayGeoIPDat","action":"output","args":{"outputName":"geoip.dat"}}]}' >> config.json
          
          echo "✅ Generated config.json:"
          cat config.json

      - name: Build geoip.dat
        run: |
          git clone https://github.com/Loyalsoldier/geoip.git compiler
          cd compiler
          cp ../config.json .
          go run ./ convert -c config.json
          cp output/dat/geoip.dat ../geoip.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip-latest
          files: geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
