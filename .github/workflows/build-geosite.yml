name: Build GeoSite

on:
  workflow_dispatch:
  push:
    paths:
      - 'geosite-rules/**.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: my-rules
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Preprocess normalize filenames and content
        run: |
          cd my-rules
          
          # 1. Переименовываем файлы в нижний регистр
          find geosite-rules -type f -name '*.txt' | while IFS= read -r f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            lower=$(echo "$base" | tr '[:upper:]' '[:lower:]')
            if [ "$base" != "$lower" ]; then
              echo "Renaming: $f -> $dir/$lower"
              git mv "$f" "$dir/$lower"
            fi
          done
          
          # 2. Исправляем ВСЕ заглавные слова, похожие на имена списков (не только с geosite:)
          find geosite-rules -type f -name '*.txt' | while IFS= read -r f; do
            # Заменяем любые слова из ЗАГЛАВНЫХ_БУКВ_ЦИФР на строчные
            # Пример: ALL_CHEV -> all_chev, Telegram -> telegram
            perl -pi -e 's/\b([A-Z][A-Z0-9_]+)\b/\L$1/g' "$f"
          done
          
          # 3. Коммитим изменения
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: normalize geosite rules [skip ci]"
            git push
            echo "Changes committed"
          else
            echo "No changes needed"
          fi

      - name: Checkout domain-list-community compiler
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          mkdir -p compiler/data
          for f in my-rules/geosite-rules/*.txt; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .txt)
            lower=$(echo "$base" | tr '[:upper:]' '[:lower:]')
            cp "$f" "compiler/data/${lower}"
          done
          cd compiler
          go run ./ --outputdir=../ --outputname=geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
