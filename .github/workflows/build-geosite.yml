name: Build GeoSite

on:
  workflow_dispatch:
  push:
    paths:
      - 'geosite-rules/**.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: my-rules

      - name: Checkout domain-list-community compiler
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          # 1. Копируем ваши файлы с доменами в папку data/ внутри компилятора
          #    Имя файла станет названием категории в geosite.dat
          cp my-rules/geosite-rules/*.txt compiler/data/
          
          # 2. Переходим в папку компилятора и запускаем сборку
          cd compiler
          go run ./ --outputdir=../ --outputname=geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
