name: Build GeoSite
on:
  workflow_dispatch:
  push:
    paths:
      - 'geosite-rules/**.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: my-rules
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Preprocess: normalize filenames and content
        run: |
          cd my-rules
          
          # 1. Переименовываем файлы с заглавными буквами в нижний регистр
          find geosite-rules -name '*.txt' | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            lower=$(echo "$base" | tr '[:upper:]' '[:lower:]')
            if [ "$base" != "$lower" ]; then
              echo "🔧 Renaming: $f → $dir/$lower"
              git mv "$f" "$dir/$lower"
            fi
          done
          
          # 2. Исправляем внутри файлов ссылки geosite:NAME → geosite:name
          find geosite-rules -name '*.txt' | while read f; do
            if grep -q 'geosite:[A-Z]' "$f"; then
              echo "🔧 Fixing uppercase refs in: $f"
              sed -i -E 's/geosite:([A-Za-z0-9_-]+)/geosite:\L\1/g' "$f"
            fi
          done
          
          # 3. Если были изменения — коммитим и пушим (опционально)
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-normalize geosite rules to lowercase [skip ci]"
            git push
            echo "✅ Changes committed and pushed"
          else
            echo "✅ No changes needed"
          fi

      - name: Checkout domain-list-community compiler
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          mkdir -p compiler/data
          for f in my-rules/geosite-rules/*.txt; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .txt)
            lower=$(echo "$base" | tr '[:upper:]' '[:lower:]')
            cp "$f" "compiler/data/${lower}"
          done
          cd compiler
          go run ./ --outputdir=../ --outputname=geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
