name: Build GeoSite

on:
  workflow_dispatch:
  push:
    paths:
      - 'geosite-rules/**.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: my-rules

      - name: Checkout domain-list-community compiler
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          mkdir -p compiler/data
          for f in my-rules/geosite-rules/*.txt; do
            # Берём имя файла, убираем расширение, приводим к нижнему регистру
            base=$(basename "$f" .txt | tr '[:upper:]' '[:lower:]')
            # Копируем в папку data с правильным именем (без .txt)
            cp "$f" "compiler/data/${base}"
            # Добавляем domain: к строкам, где нет domain: или full:
            sed -i -E '/^(domain:|full:)/! s/^[[:space:]]*(.+)[[:space:]]*$/domain:\1/' "compiler/data/${base}"
          done
          cd compiler
          go run ./ --outputdir=../ --outputname=geosite.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geosite-latest
          files: geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
