name: Build GeoIP

on:
  workflow_dispatch:
  push:
    paths:
      - 'geoip-rules/**.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: my-rules

      - name: Checkout geoip compiler
        uses: actions/checkout@v4
        with:
          repository: v2fly/geoip
          path: compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geoip.dat
        run: |
          # Объединяем все IP-файлы в один
          cat my-rules/geoip-rules/*.txt > custom-ips.txt
          
          # Создаём правильный JSON-конфиг
          echo '{"input": ["text:custom-ips.txt"], "output": "geoip.dat"}' > config.json
          
          # Переходим в папку компилятора и запускаем сборку
          cd compiler
          go run ./ -c ../config.json
          
          # Забираем готовый файл и кладём в корень
          cp geoip.dat ../geoip.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip-latest
          files: geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
