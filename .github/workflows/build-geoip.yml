name: Build GeoIP
on:
  workflow_dispatch:
  push:
    paths:
      - 'geoip-rules/**.txt'
      - 'config.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geoip.dat
        run: |
          git clone https://github.com/Loyalsoldier/geoip.git compiler
          cd compiler
          cp ../config.json .
          go run ./ convert -c config.json
          cp output/dat/geoip.dat ../geoip.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip-latest
          files: geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
