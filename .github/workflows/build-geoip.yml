name: Build GeoIP

on:
  workflow_dispatch:
  push:
    paths:
      - 'geoip-rules/**.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Build geoip.dat using official action
        uses: v2fly/geoip-action@v1
        with:
          input: geoip-rules/*.txt
          output: geoip.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip-latest
          files: geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
