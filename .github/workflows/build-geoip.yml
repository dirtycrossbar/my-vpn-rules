name: Build GeoIP

on:
  workflow_dispatch:
  push:
    paths:
      - 'geoip-rules/**.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build geoip.dat
        run: |
          git clone https://github.com/Loyalsoldier/geoip.git compiler
          cd compiler
          
          # Копируем ваши файлы прямо в папку компилятора
          cp ../geoip-rules/*.txt .
          
          # Создаем простой и правильный config.json
          echo '{' > config.json
          echo '  "input": [' >> config.json
          first=true
          for f in *.txt; do
            name=$(basename "$f" .txt)
            if [ "$first" = true ]; then first=false; else echo ',' >> config.json; fi
            echo "    {\"type\": \"text\", \"action\": \"add\", \"args\": [\"$name\", \"$f\"]}" >> config.json
          done
          echo '  ],' >> config.json
          echo '  "output": [{"type": "v2rayGeoIPDat", "args": ["geoip.dat"]}]' >> config.json
          echo '}' >> config.json
          
          cat config.json
          go run ./ convert -c config.json
          cp geoip.dat ../geoip.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip-latest
          files: geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
