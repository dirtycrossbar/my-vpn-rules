name: Build GeoIP

on:
  workflow_dispatch:
  push:
    paths:
      - 'geoip-rules/**.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: my-rules

      - name: Checkout Loyalsoldier/geoip compiler
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/geoip
          path: compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod
          cache: true
          cache-dependency-path: compiler/go.sum

      - name: Build geoip.dat
        run: |
          cd compiler
          
          # Генерируем config.json (без экранирования кавычек)
          echo '{' > config.json
          echo '  "input": [' >> config.json
          first=true
          for f in ../my-rules/geoip-rules/*.txt; do
            name=$(basename "$f" .txt)
            abs_path=$(realpath "$f")
            if [ "$first" = true ]; then first=false; else echo ',' >> config.json; fi
            echo "    {\"type\": \"text\", \"action\": \"add\", \"args\": [\"$name\", \"file://$abs_path\"]}" >> config.json
          done
          echo '  ],' >> config.json
          echo '  "output": [{"type": "v2rayGeoIPDat", "args": ["geoip.dat"]}]' >> config.json
          echo '}' >> config.json
          
          cat config.json
          go run ./ convert -c config.json
          cp geoip.dat ../geoip.dat

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip-latest
          files: geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
